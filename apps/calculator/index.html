<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Calculator</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    /* iOS Viewport Lock & Cinematic Background */
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh; 
      min-height: -webkit-fill-available;
      overscroll-behavior-y: none;
      background: linear-gradient(-45deg, #09090e, #13131f, #0c0c16, #050508);
      background-size: 400% 400%;
      animation: ambientGlow 20s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #ffffff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    @keyframes ambientGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Top Navigation */
    .nav-bar {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      left: 20px;
      margin-top: 20px;
      z-index: 10;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .back-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }

    /* Premium Calculator Container */
    .calc-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 30px;
      width: 90%;
      max-width: 360px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 20px 50px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: floatCard 8s infinite ease-in-out;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Display Area */
    .display {
      width: 100%;
      text-align: right;
      padding: 20px 10px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow-wrap: break-word;
    }

    .previous-operand {
      color: #a1a1aa;
      font-size: 18px;
      min-height: 24px;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .current-operand {
      color: #ffffff;
      font-size: 56px;
      font-weight: 300;
      letter-spacing: -2px;
      line-height: 1;
    }

    /* Keypad Grid */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 50%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 400;
      color: #ffffff;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.01);
    }

    /* ASMR satisfying click */
    .btn:active {
      transform: scale(0.85);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    /* Special Buttons styling */
    .btn.action {
      color: #a1a1aa;
      font-size: 20px;
    }

    .btn.operator {
      color: #45f3ff; /* Matches your Hub's counter icon cyan glow */
      font-size: 28px;
      font-weight: 300;
    }

    .btn.operator:active {
      background: rgba(69, 243, 255, 0.15);
    }

    .btn.equals {
      background: rgba(69, 243, 255, 0.15);
      color: #45f3ff;
      border-color: rgba(69, 243, 255, 0.3);
      box-shadow: 0 0 20px rgba(69, 243, 255, 0.2);
    }
    
    .btn.equals:active {
      background: rgba(69, 243, 255, 0.3);
      transform: scale(0.85);
    }

    .btn.zero {
      grid-column: span 2;
      aspect-ratio: auto;
      border-radius: 40px;
      justify-content: flex-start;
      padding-left: 30px;
    }
  </style>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

  <div class="nav-bar">
    <a href="../../index.html" class="back-btn">
      <ion-icon name="chevron-back-outline"></ion-icon> Hub
    </a>
  </div>

  <div class="calc-container">
    <div class="display">
      <div class="previous-operand" id="previous"></div>
      <div class="current-operand" id="current">0</div>
    </div>
    
    <div class="keypad">
      <div class="btn action" onclick="clearDisplay()">AC</div>
      <div class="btn action" onclick="toggleSign()">+/-</div>
      <div class="btn action" onclick="appendOperator('%')">%</div>
      <div class="btn operator" onclick="appendOperator('/')">÷</div>
      
      <div class="btn" onclick="appendNumber('7')">7</div>
      <div class="btn" onclick="appendNumber('8')">8</div>
      <div class="btn" onclick="appendNumber('9')">9</div>
      <div class="btn operator" onclick="appendOperator('*')">×</div>
      
      <div class="btn" onclick="appendNumber('4')">4</div>
      <div class="btn" onclick="appendNumber('5')">5</div>
      <div class="btn" onclick="appendNumber('6')">6</div>
      <div class="btn operator" onclick="appendOperator('-')">−</div>
      
      <div class="btn" onclick="appendNumber('1')">1</div>
      <div class="btn" onclick="appendNumber('2')">2</div>
      <div class="btn" onclick="appendNumber('3')">3</div>
      <div class="btn operator" onclick="appendOperator('+')">+</div>
      
      <div class="btn zero" onclick="appendNumber('0')">0</div>
      <div class="btn" onclick="appendNumber('.')">.</div>
      <div class="btn equals" onclick="calculate()">=</div>
    </div>
  </div>

  <script>
    let currentInput = '0';
    let previousInput = '';
    let operation = undefined;
    
    const currentDisplay = document.getElementById('current');
    const previousDisplay = document.getElementById('previous');

    function updateDisplay() {
      currentDisplay.innerText = currentInput;
      if (operation != null) {
        let opSymbol = operation;
        if(opSymbol === '*') opSymbol = '×';
        if(opSymbol === '/') opSymbol = '÷';
        previousDisplay.innerText = `${previousInput} ${opSymbol}`;
      } else {
        previousDisplay.innerText = '';
      }
    }

    function appendNumber(number) {
      if (number === '.' && currentInput.includes('.')) return;
      if (currentInput === '0' && number !== '.') {
        currentInput = number;
      } else {
        currentInput = currentInput.toString() + number.toString();
      }
      updateDisplay();
    }

    function appendOperator(op) {
      if (currentInput === '' && op === '-') {
        currentInput = '-';
        updateDisplay();
        return;
      }
      if (currentInput === '') return;
      if (previousInput !== '') {
        calculate();
      }
      operation = op;
      previousInput = currentInput;
      currentInput = '';
      updateDisplay();
    }

    function calculate() {
      let computation;
      const prev = parseFloat(previousInput);
      const current = parseFloat(currentInput);
      if (isNaN(prev) || isNaN(current)) return;
      switch (operation) {
        case '+':
          computation = prev + current;
          break;
        case '-':
          computation = prev - current;
          break;
        case '*':
          computation = prev * current;
          break;
        case '/':
          computation = prev / current;
          break;
        case '%':
          computation = prev % current;
          break;
        default:
          return;
      }
      currentInput = computation.toString();
      operation = undefined;
      previousInput = '';
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '0';
      previousInput = '';
      operation = undefined;
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput === '') return;
      if (currentInput !== '0') {
        currentInput = (parseFloat(currentInput) * -1).toString();
        updateDisplay();
      }
    }
  </script>
</body>
</html>
