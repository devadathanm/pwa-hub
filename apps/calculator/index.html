<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Counter</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f5f5f7; }
    h1 { font-size: 72px; margin: 20px 0; color: #1d1d1f; }
    button { padding: 20px 40px; font-size: 20px; font-weight: 600; border-radius: 12px; border: none; background-color: #007aff; color: white; cursor: pointer; }
    button:active { transform: scale(0.95); }
    .back { margin-top: 40px; text-decoration: none; color: #007aff; font-weight: 500; }
  </style>
</head>
<body>

  <h1 id="count">0</h1>
  <button onclick="document.getElementById('count').innerText++">Tap to Count</button>

  <a href="../../index.html" class="back">← Back to Hub</a>

</body>
</html>
