<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Atelier Chronometer</title>
  <style>
    :root {
      --bg: #09090b;
      --surface: #151518;
      --border: rgba(255, 255, 255, 0.05);
      --text-main: #f4f4f5;
      --text-dim: #71717a;
      --accent: #ff4747;
      --btn-dark: #222225;
    }

    * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }

    html, body {
      width: 100vw; height: 100dvh;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
      color: var(--text-main);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .app-container {
      display: flex; flex-direction: column; gap: 16px;
      width: 90vw; max-width: 340px; position: relative; z-index: 10;
    }

    /* --- NAVIGATION --- */
    .nav-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px; margin-bottom: 4px;
    }
    .back-btn {
      background: transparent; border: none; color: var(--text-dim);
      font-size: 14px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text-main); }
    .nav-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); font-weight: 700; }

    /* --- MODULE BASE --- */
    .module {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* --- 1. TIME MODULE --- */
    .time-module {
      display: flex; justify-content: center; align-items: center;
      padding: 40px 20px;
      min-height: 240px; 
    }
    
    .clock-wrapper {
      position: relative; width: 180px; height: 180px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .seconds-ring { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      transform: rotate(-90deg); pointer-events: none;
    }
    
    .ring-track { fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 3; }
    .ring-progress { 
      fill: none; stroke: var(--accent); stroke-width: 3; 
      stroke-dasharray: 540.35; stroke-dashoffset: 540.35; 
      stroke-linecap: round; transition: stroke-dashoffset 0.1s linear;
    }

    .time-display { display: flex; flex-direction: column; align-items: center; z-index: 2; margin-top: 5px; }
    .time-main { font-size: 52px; font-weight: 300; letter-spacing: -1px; line-height: 1; font-variant-numeric: tabular-nums; }
    .colon { color: var(--text-dim); margin: 0 2px; font-weight: 200; }
    
    .time-sub { display: flex; gap: 8px; align-items: center; margin-top: 8px; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
    .sec { color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .ampm { color: var(--accent); }

    /* --- 2. STOPWATCH MODULE --- */
    .stopwatch-module { text-align: center; padding: 24px 20px; }
    .sw-time { font-variant-numeric: tabular-nums; font-size: 38px; font-weight: 400; letter-spacing: -1px; margin-bottom: 20px; }
    .sw-ms { font-size: 16px; color: var(--text-dim); font-weight: 300; }
    
    .sw-controls { display: flex; gap: 12px; }
    .btn {
      flex: 1; font-size: 14px; font-weight: 500;
      padding: 12px 0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
      border: none;
    }
    .btn:active { transform: scale(0.97); }
    
    .btn-reset { background: var(--btn-dark); color: var(--text-main); }
    .btn-reset:hover { background: #2a2a2e; }
    .btn-start { background: var(--text-main); color: #000; font-weight: 600; }
    .btn-start:hover { background: #fff; }
    .btn-start.active { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(255, 71, 71, 0.3); }

    /* --- 3. CALENDAR MODULE --- */
    .cal-module { padding: 24px; }
    .cal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
    .cal-month { font-size: 15px; font-weight: 700; }
    .cal-year { font-size: 13px; color: var(--text-dim); font-weight: 500; }

    .days-head { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 12px; }
    .day-label { font-size: 9px; color: var(--text-dim); text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .day-cell {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-main); font-weight: 500;
      border-radius: 50%; transition: all 0.2s;
    }
    
    .day-cell.active-day { background: var(--btn-dark); }
    .day-cell.today { 
      background: var(--accent); color: #fff; font-weight: 700; 
      box-shadow: 0 0 16px rgba(255, 71, 71, 0.4); 
    }
    .day-cell.empty { background: transparent; pointer-events: none; }

  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="nav-bar">
      <button onclick="goHome()" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <div class="nav-title">Chronometer</div>
    </div>

    <div class="module time-module">
      <div class="clock-wrapper">
        <svg class="seconds-ring" viewBox="0 0 180 180">
          <circle class="ring-track" cx="90" cy="90" r="86"></circle>
          <circle class="ring-progress" id="sweep-hand" cx="90" cy="90" r="86"></circle>
        </svg>
        <div class="time-display">
          <div class="time-main">
            <span id="c-hrs">00</span><span class="colon">:</span><span id="c-min">00</span>
          </div>
          <div class="time-sub">
            <span class="sec" id="c-sec">00</span> <span class="ampm" id="c-ampm">AM</span>
          </div>
        </div>
      </div>
    </div>

    <div class="module stopwatch-module">
      <div class="sw-time">
        <span id="sw-min">00</span>:<span id="sw-sec">00</span><span class="sw-ms">.<span id="sw-ms">00</span></span>
      </div>
      <div class="sw-controls">
        <button class="btn btn-reset" id="btn-reset">Reset</button>
        <button class="btn btn-start" id="btn-start">Start</button>
      </div>
    </div>

    <div class="module cal-module">
      <div class="cal-header">
        <div class="cal-month" id="cal-month">Month</div>
        <div class="cal-year" id="cal-year">2026</div>
      </div>
      <div class="days-head">
        <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div>
        <div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
      </div>
      <div class="days-grid" id="days-grid"></div>
    </div>

  </div>

  <script>
    // --- NAVIGATION LOGIC ---
    function goHome() {
      // Assuming this file is inside 'apps/clock/', this path jumps up two folders to the root index.html
      // If your main hub is located somewhere else, you can adjust this path.
      window.location.href = '../../index.html'; 
    }

    // --- TIME LOGIC ---
    const sweepHand = document.getElementById('sweep-hand');
    const circumference = 2 * Math.PI * 86; // 540.35

    function updateTime() {
      const now = new Date();
      let hrs = now.getHours();
      
      document.getElementById('c-hrs').innerText = (hrs % 12 || 12).toString().padStart(2, '0');
      document.getElementById('c-min').innerText = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('c-sec').innerText = now.getSeconds().toString().padStart(2, '0');
      document.getElementById('c-ampm').innerText = hrs >= 12 ? 'PM' : 'AM';

      const ms = now.getMilliseconds();
      const sec = now.getSeconds();
      const totalSeconds = sec + (ms / 1000);
      const percentage = totalSeconds / 60;
      
      const offset = circumference - (percentage * circumference);
      sweepHand.style.strokeDashoffset = offset;

      requestAnimationFrame(updateTime);
    }
    requestAnimationFrame(updateTime);

    // --- CALENDAR LOGIC ---
    function renderCalendar() {
      const g = document.getElementById('days-grid');
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const today = now.getDate();
      
      document.getElementById('cal-month').innerText = now.toLocaleString('default', { month: 'long' });
      document.getElementById('cal-year').innerText = year;

      const firstDayIndex = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      g.innerHTML = ''; 

      // Empty lead-in days
      for(let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'day-cell empty';
        g.appendChild(emptyCell);
      }

      // Actual days
      for(let i = 1; i <= daysInMonth; i++) {
        const c = document.createElement('div');
        c.className = 'day-cell' + (i === today ? ' today' : ' active-day');
        c.innerText = i;
        g.appendChild(c);
      }
    }
    renderCalendar();

    // --- STOPWATCH LOGIC ---
    let startTime = 0, elapsedTime = 0, timerInterval = null, isRunning = false;
    const elMin = document.getElementById('sw-min'), elSec = document.getElementById('sw-sec'), elMs = document.getElementById('sw-ms');
    const btnStart = document.getElementById('btn-start'), btnReset = document.getElementById('btn-reset');

    function formatStopwatch(time) {
      let ms = Math.floor((time % 1000) / 10);
      let ss = Math.floor((time / 1000) % 60);
      let mm = Math.floor((time / (1000 * 60)) % 60);
      
      elMin.innerText = mm.toString().padStart(2, "0");
      elSec.innerText = ss.toString().padStart(2, "0");
      elMs.innerText = ms.toString().padStart(2, "0");
    }

    function toggleStopwatch() {
      if(isRunning) {
        clearInterval(timerInterval);
        btnStart.innerText = "Start";
        btnStart.classList.remove('active'); 
      } else {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
          elapsedTime = Date.now() - startTime;
          formatStopwatch(elapsedTime);
        }, 10);
        btnStart.innerText = "Stop";
        btnStart.classList.add('active'); 
      }
      isRunning = !isRunning;
    }

    function resetStopwatch() {
      clearInterval(timerInterval);
      elapsedTime = 0;
      formatStopwatch(0);
      isRunning = false;
      btnStart.innerText = "Start";
      btnStart.classList.remove('active');
    }

    btnStart.addEventListener('click', toggleStopwatch);
    btnReset.addEventListener('click', resetStopwatch);
  </script>
</body>
</html>
