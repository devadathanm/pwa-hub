<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Clock & Calendar</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0c">
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <style>
    /* Absolute Zero-G Environment */
    html, body {
      margin: 0; padding: 0;
      width: 100vw; 
      height: 100dvh; 
      min-height: -webkit-fill-available;
      overscroll-behavior-y: none;
      background-color: #030305;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #ffffff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      perspective: 1200px; /* High-depth cinematic perspective field */
    }

    /* --- 3D AMBIENT TIME NEBULAS --- */
    .bg-orbs {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0; pointer-events: none;
      transform-style: preserve-3d;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      animation: orbit3D 25s infinite linear;
    }

    .orb-1 {
      width: 350px; height: 350px;
      background: #45f3ff;
      top: 5%; left: -15%;
      transform-origin: 300px 280px;
    }

    .orb-2 {
      width: 450px; height: 450px;
      background: #bc13fe;
      bottom: -15%; right: -15%;
      transform-origin: -250px -200px;
      animation-direction: reverse;
      animation-duration: 30s;
    }

    /* Third deep orb establishing the background floor */
    .orb-3 {
      width: 280px; height: 280px;
      background: #3b82f6;
      top: 45%; left: 40%;
      opacity: 0.15;
      animation: orbit3D 18s infinite linear alternate;
    }

    @keyframes orbit3D {
      0% { transform: rotateZ(0deg) rotateY(0deg) translateZ(-150px); }
      50% { transform: rotateZ(180deg) rotateY(15deg) translateZ(-50px); }
      100% { transform: rotateZ(360deg) rotateY(0deg) translateZ(-150px); }
    }
    /* ----------------------------------- */

    .nav-bar {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      left: 20px; margin-top: 20px; z-index: 15;
      transform: translateZ(60px); /* Primary floating UI row */
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: white; padding: 10px 20px; border-radius: 20px;
      font-size: 14px; font-weight: 500; text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* GYROSCOPIC/INTERACTIVE 3D GLASS SHEET CONTAINER */
    .app-container {
      position: relative; z-index: 5;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
      border-radius: 44px; padding: 32px;
      width: 90vw; max-width: 360px;
      height: 80dvh; max-height: 640px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03), 0 35px 75px rgba(0, 0, 0, 0.65);
      display: flex; flex-direction: column;
      transform-style: preserve-3d;
      /* Soft baseline floating engine, combined with dynamic JS overrides */
      transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
      box-sizing: border-box;
    }

    /* --- DIGITAL TIMELINE MATRIX --- */
    .clock-section {
      text-align: center; padding-bottom: 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 24px;
      transform-style: preserve-3d;
      transform: translateZ(45px); /* Forces structural projection */
    }

    .time-display {
      font-size: clamp(58px, 14vw, 76px); font-weight: 700; line-height: 1; letter-spacing: -2px;
      background: linear-gradient(180deg, #ffffff 30%, #b5b5be 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
      display: flex; justify-content: center; align-items: baseline; gap: 6px;
      transform: translateZ(15px); /* Double projection stack */
    }

    .seconds-am {
      display: flex; flex-direction: column; align-items: flex-start;
      font-size: 15px; font-weight: 600; letter-spacing: 1px;
      -webkit-text-fill-color: #45f3ff; text-transform: uppercase;
      text-shadow: 0 0 12px rgba(69, 243, 255, 0.4);
    }

    .date-display { 
      font-size: 13px; color: #a1a1aa; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 12px;
      transform: translateZ(5px);
    }

    /* --- MOLECULAR CALENDAR COMPONENT --- */
    .calendar-section { 
      flex-grow: 1; display: flex; flex-direction: column; 
      transform-style: preserve-3d;
      transform: translateZ(30px); 
    }
    
    .cal-header { 
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; 
      font-weight: 600; font-size: 18px; letter-spacing: -0.5px;
      transform: translateZ(10px);
    }
    
    .weekdays { 
      display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; 
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); margin-bottom: 12px; 
      text-transform: uppercase; letter-spacing: 1.5px;
      transform: translateZ(5px);
    }
    
    .days-grid { 
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; 
      flex-grow: 1; align-content: start; perspective: 600px;
      transform-style: preserve-3d;
    }

    .day-cell {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #ffffff; border-radius: 50%;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.02);
      opacity: 0;
      transform-style: preserve-3d;
      animation: flipIn3D 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s, border 0.2s;
    }

    @keyframes flipIn3D {
      0% { opacity: 0; transform: rotateX(70deg) translateZ(-40px) scale(0.6); }
      100% { opacity: 1; transform: rotateX(0deg) translateZ(0px) scale(1); }
    }

    .day-cell.empty { background: transparent; border-color: transparent; pointer-events: none; }
    
    /* Tactile Interactions */
    .day-cell:not(.empty):active {
      transform: translateZ(-8px) scale(0.9); /* Physically stamp inward into the container matrix */
      background: rgba(255, 255, 255, 0.08);
    }

    /* The Neon-Crowned Current Day Node */
    .day-cell.today {
      background: rgba(69, 243, 255, 0.12); color: #45f3ff;
      border: 1px solid rgba(69, 243, 255, 0.4);
      box-shadow: 0 4px 15px rgba(69, 243, 255, 0.25), inset 0 0 10px rgba(69, 243, 255, 0.1);
      font-weight: 700;
      text-shadow: 0 0 8px rgba(69, 243, 255, 0.5);
      transform: translateZ(16px); /* Violently forces node out of grid surface plane */
    }
    
    .day-cell.today:active {
      transform: translateZ(4px) scale(0.92); /* Remains structural even under force compression */
    }

  </style>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="nav-bar"><a href="/" class="back-btn"><ion-icon name="chevron-back-outline"></ion-icon> Hub</a></div>

  <div class="app-container" id="interactive-card">
    <div class="clock-section">
      <div class="time-display" id="time">
        <span id="hours-mins">12:00</span>
        <div class="seconds-am"><span id="ampm">AM</span><span id="seconds">00</span></div>
      </div>
      <div class="date-display" id="full-date">Loading...</div>
    </div>

    <div class="calendar-section">
      <div class="cal-header">
        <span id="cal-month-year">Month Year</span>
        <ion-icon name="time-outline" style="color: #45f3ff; filter: drop-shadow(0 0 8px #45f3ff50);"></ion-icon>
      </div>
      <div class="weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
      <div class="days-grid" id="days-grid"></div>
    </div>
  </div>

  <script>
    // --- CLOCK QUANTUM FLOW LOGIC ---
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const mins = now.getMinutes().toString().padStart(2, '0');
      const secs = now.getSeconds().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      
      hours = hours % 12;
      hours = hours ? hours : 12; 

      document.getElementById('hours-mins').innerText = `${hours}:${mins}`;
      document.getElementById('seconds').innerText = secs;
      document.getElementById('ampm').innerText = ampm;

      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      document.getElementById('full-date').innerText = now.toLocaleDateString('en-US', options);
    }

    setInterval(updateClock, 1000);
    updateClock();

    // --- CALENDAR GENERATION MATRICES ---
    function renderCalendar() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth();
      const todayDate = now.getDate();

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      document.getElementById('cal-month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;

      const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const grid = document.getElementById('days-grid');
      grid.innerHTML = '';

      let delayCounter = 0; 

      for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.classList.add('day-cell', 'empty');
        grid.appendChild(emptyCell);
        delayCounter++;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dayCell = document.createElement('div');
        dayCell.classList.add('day-cell');
        dayCell.innerText = day;
        
        dayCell.style.animationDelay = `${delayCounter * 0.02}s`;
        
        if (day === todayDate) {
          dayCell.classList.add('today');
        }
        
        grid.appendChild(dayCell);
        delayCounter++;
      }
    }
    
    renderCalendar();

    // --- INTERACTIVE POINTER EXTENSION TILT MODULE (3D PARALLAX) ---
    const card = document.getElementById('interactive-card');
    
    function processTilt(clientX, clientY, targetRect) {
      // Calculate coordinates relative to container midpoint coordinates
      const cardCenterX = targetRect.left + targetRect.width / 2;
      const cardCenterY = targetRect.top + targetRect.height / 2;
      
      const deltaX = clientX - cardCenterX;
      const deltaY = clientY - cardCenterY;
      
      // Convert to normalized mathematical rotation degrees (Max angle constraint: 14 deg)
      const rotateX = (deltaY / (targetRect.height / 2)) * -14;
      const rotateY = (deltaX / (targetRect.width / 2)) * 14;
      
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
    }

    // Desktop Tracker Integration
    window.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      processTilt(e.clientX, e.clientY, rect);
    });

    // Mobile Digitizer Touch Interface Integration
    window.addEventListener('touchmove', (e) => {
      if(e.touches.length > 0) {
        const rect = card.getBoundingClientRect();
        processTilt(e.touches[0].clientX, e.touches[0].clientY, rect);
      }
    }, { passive: true });

    // Automatic Decay/Return Sequence when input ends
    function resetTilt() {
      card.style.transform = `rotateX(0deg) rotateY(0deg) translateY(0px)`;
    }
    window.addEventListener('mouseleave', resetTilt);
    window.addEventListener('touchend', resetTilt);

    // Standard platform routing mechanics
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = () => { window.location.href = '/'; };
  </script>
</body>
</html>
