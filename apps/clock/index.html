<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Clock & Calendar</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0c">
  
  <style>
    /* 3D Viewport Setup */
    html, body {
      margin: 0; padding: 0;
      width: 100vw; 
      height: 100dvh; /* FIXED: Dynamic Viewport Height */
      min-height: -webkit-fill-available;
      overscroll-behavior-y: none;
      background-color: #050508;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #ffffff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      perspective: 1000px; /* Crucial for 3D depth */
    }

    /* --- 3D AMBIENT TIME BACKGROUND --- */
    .bg-orbs {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0; pointer-events: none;
      transform-style: preserve-3d;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbit3D 20s infinite linear;
    }

    .orb-1 {
      width: 300px; height: 300px;
      background: #45f3ff; /* Cyan */
      top: 10%; left: -10%;
      transform-origin: 250px 250px;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: #bc13fe; /* Purple */
      bottom: -10%; right: -10%;
      transform-origin: -200px -200px;
      animation-direction: reverse;
      animation-duration: 25s;
    }

    @keyframes orbit3D {
      0% { transform: rotateZ(0deg) rotateY(0deg) translateZ(-100px); }
      50% { transform: rotateZ(180deg) rotateY(20deg) translateZ(50px); }
      100% { transform: rotateZ(360deg) rotateY(0deg) translateZ(-100px); }
    }
    /* ----------------------------------- */

    .nav-bar {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      left: 20px; margin-top: 20px; z-index: 10;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: white; padding: 10px 20px; border-radius: 20px;
      font-size: 14px; font-weight: 500; text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }

    /* 3D Floating Glass Container */
    .app-container {
      position: relative; z-index: 5;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-radius: 40px; padding: 30px;
      width: 90vw; max-width: 360px;
      height: 82dvh; /* FIXED: Dynamic Viewport Height */
      max-height: 650px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 30px 60px rgba(0, 0, 0, 0.6);
      display: flex; flex-direction: column;
      transform-style: preserve-3d;
      animation: float3D 8s infinite alternate ease-in-out;
    }

    @keyframes float3D {
      0% { transform: translateY(0px) rotateX(2deg) rotateY(-2deg); }
      100% { transform: translateY(-15px) rotateX(-2deg) rotateY(2deg); }
    }

    /* --- DIGITAL CLOCK --- */
    .clock-section {
      text-align: center; padding-bottom: 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
      transform: translateZ(20px); /* Pushes clock forward in 3D space */
    }

    .time-display {
      font-size: clamp(60px, 15vw, 80px); font-weight: 700; line-height: 1; letter-spacing: -2px;
      background: linear-gradient(180deg, #ffffff, #a1a1aa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
      display: flex; justify-content: center; align-items: baseline; gap: 5px;
    }

    .seconds-am {
      display: flex; flex-direction: column; align-items: flex-start;
      font-size: 16px; font-weight: 500; letter-spacing: 1px;
      -webkit-text-fill-color: #45f3ff; text-transform: uppercase;
    }

    .date-display { font-size: 14px; color: #a1a1aa; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

    /* --- CALENDAR SECTION --- */
    .calendar-section { flex-grow: 1; display: flex; flex-direction: column; transform: translateZ(10px); }
    
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 600; font-size: 18px; }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: 600; color: #a1a1aa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; flex-grow: 1; align-content: start; perspective: 500px; }

    .day-cell {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #ffffff; border-radius: 50%;
      /* 3D Staggered Cascade Setup */
      opacity: 0;
      animation: flipIn3D 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes flipIn3D {
      0% { opacity: 0; transform: rotateY(90deg) translateZ(-50px) scale(0.5); }
      100% { opacity: 1; transform: rotateY(0deg) translateZ(0px) scale(1); }
    }

    .day-cell.empty { background: transparent; pointer-events: none; }
    
    .day-cell.today {
      background: rgba(69, 243, 255, 0.15); color: #45f3ff;
      border: 1px solid rgba(69, 243, 255, 0.3);
      box-shadow: 0 0 20px rgba(69, 243, 255, 0.3);
      font-weight: 700;
      transform: translateZ(15px); /* Today pops out slightly */
    }

  </style>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="nav-bar"><a href="/" class="back-btn"><ion-icon name="chevron-back-outline"></ion-icon> Hub</a></div>

  <div class="app-container">
    <div class="clock-section">
      <div class="time-display" id="time">
        <span id="hours-mins">12:00</span>
        <div class="seconds-am"><span id="ampm">AM</span><span id="seconds">00</span></div>
      </div>
      <div class="date-display" id="full-date">Loading...</div>
    </div>

    <div class="calendar-section">
      <div class="cal-header">
        <span id="cal-month-year">Month Year</span>
        <ion-icon name="calendar-outline" style="color: #45f3ff;"></ion-icon>
      </div>
      <div class="weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
      <div class="days-grid" id="days-grid"></div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const mins = now.getMinutes().toString().padStart(2, '0');
      const secs = now.getSeconds().toString().padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      
      hours = hours % 12;
      hours = hours ? hours : 12; 

      document.getElementById('hours-mins').innerText = `${hours}:${mins}`;
      document.getElementById('seconds').innerText = secs;
      document.getElementById('ampm').innerText = ampm;

      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      document.getElementById('full-date').innerText = now.toLocaleDateString('en-US', options);
    }

    setInterval(updateClock, 1000);
    updateClock();

    function renderCalendar() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth();
      const todayDate = now.getDate();

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      document.getElementById('cal-month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;

      const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const grid = document.getElementById('days-grid');
      grid.innerHTML = '';

      let delayCounter = 0; // Used to stagger the 3D animation

      for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.classList.add('day-cell', 'empty');
        grid.appendChild(emptyCell);
        delayCounter++;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dayCell = document.createElement('div');
        dayCell.classList.add('day-cell');
        dayCell.innerText = day;
        
        // Dynamically apply a slightly delayed 3D flip animation to each day
        dayCell.style.animationDelay = `${delayCounter * 0.03}s`;
        
        if (day === todayDate) {
          dayCell.classList.add('today');
        }
        
        grid.appendChild(dayCell);
        delayCounter++;
      }
    }
    
    renderCalendar();

    window.history.pushState(null, null, window.location.href);
    window.onpopstate = () => { window.location.href = '/'; };
  </script>
</body>
</html>
