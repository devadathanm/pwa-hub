<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Weather</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    /* iOS Viewport Lock & Cinematic Background */
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh; 
      min-height: -webkit-fill-available;
      overscroll-behavior-y: none;
      background: linear-gradient(-45deg, #09090e, #13131f, #0c0c16, #050508);
      background-size: 400% 400%;
      animation: ambientGlow 20s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #ffffff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    @keyframes ambientGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Top Navigation */
    .nav-bar {
      position: absolute;
      top: env(safe-area-inset-top, 20px);
      left: 20px;
      margin-top: 20px;
      z-index: 10;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .back-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }

    /* Premium Glass UI for Weather */
    .weather-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 20px 40px rgba(0, 0, 0, 0.5);
      animation: floatCard 6s infinite ease-in-out;
      width: 85%;
      max-width: 350px;
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .status-text {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a1a1aa;
      margin-bottom: 20px;
    }

    .temp-display {
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(180deg, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
    }

    .condition-display {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 30px;
      color: #ffeb3b;
      filter: drop-shadow(0 0 12px rgba(255, 235, 59, 0.6));
    }

    .details-row {
      display: flex;
      gap: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 25px;
      width: 100%;
      justify-content: center;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .detail-label {
      font-size: 11px;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: 600;
    }
    
    .loader {
      font-size: 16px;
      color: #a1a1aa;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

  <div class="nav-bar">
    <a href="/" class="back-btn">
      <ion-icon name="chevron-back-outline"></ion-icon> Hub
    </a>
  </div>

  <div class="weather-card" id="app-container">
    <div class="loader" id="loading-text">Locating Signal...</div>
  </div>

<script>
    const appContainer = document.getElementById('app-container');

    const weatherCodes = {
      0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
      45: "Foggy", 61: "Slight Rain", 63: "Moderate Rain", 95: "Thunderstorm"
    };

    // This function fetches weather for any location
    const fetchWeather = async (lat, lon, label = "Current Location") => {
      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        const data = await response.json();
        const weather = data.current_weather;
        
        appContainer.innerHTML = `
          <div class="status-text">${label}</div>
          <div class="temp-display">${Math.round(weather.temperature)}°</div>
          <div class="condition-display">${weatherCodes[weather.weathercode] || "Conditions"}</div>
          <div class="details-row">
            <div class="detail-item"><span class="detail-label">Wind</span><span class="detail-value">${Math.round(weather.windspeed)} km/h</span></div>
          </div>
        `;
      } catch (e) {
        appContainer.innerHTML = `<div class="status-text" style="color:#ff3b30;">Signal Lost</div>`;
      }
    };

    // GPS Logic with Fallback
    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(
        (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
        () => fetchWeather(51.5074, -0.1278, "London (Fallback)"), // Fallback to London if GPS denied
        { timeout: 5000 } // 5-second limit
      );
    } else {
      fetchWeather(51.5074, -0.1278, "London (Default)");
    }
  </script>
</body>
</html>
